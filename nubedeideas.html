<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nube de Ideas Pro - SAP Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ startOnLoad: false, theme: 'dark' });
    </script>
    <style>
        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #nubeCanvas {
            position: relative; min-height: 75vh; width: 100%;
            background: radial-gradient(circle, #1e293b 0%, #0b1120 100%);
            border-radius: 2rem; overflow: hidden; border: 1px dashed #334155;
        }
        .idea-flotante {
            position: absolute; cursor: pointer; transition: all 0.3s ease;
            white-space: nowrap; user-select: none; padding: 5px 10px; border-radius: 8px;
        }
        .idea-flotante:hover { transform: scale(1.2); background: rgba(245, 158, 11, 0.2); color: #fbbf24 !important; z-index: 100; }
        .input-field { background-color: #0b1120; border: 1px solid #374151; color: white; }
        .input-field:focus { border-color: #f59e0b; outline: none; }
        #diagramContainer svg { max-width: 100%; height: auto; margin: auto; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter">
                <i class="fas fa-project-diagram text-amber-500 mr-2"></i> SAP Architecture Cloud
            </h1>
            <div class="flex gap-2">
                <input type="text" id="buscador" onkeyup="filtrarNotas()" placeholder="Buscar procesos o diagramas..." class="input-field px-4 py-2 rounded-lg text-sm w-64">
                <button onclick="exportarDatos()" class="text-xs text-slate-500 hover:text-white"><i class="fas fa-download"></i></button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1">
                <div class="bg-slate-900/50 p-6 rounded-3xl border border-slate-800">
                    <h2 class="text-amber-400 font-bold mb-4 text-sm uppercase">Nuevo Proceso / Diagrama</h2>
                    <input type="text" id="titulo" placeholder="Título (ej: Flujo GRC)" class="w-full input-field p-3 rounded-xl text-sm mb-3">
                    <textarea id="contenido" rows="8" placeholder="Puedes pegar código Mermaid aquí:
graph TD
A[Inicio] --> B(Proceso SAP)" class="w-full input-field p-3 rounded-xl text-sm mb-3 font-mono"></textarea>
                    <button onclick="guardarNota()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-xl transition">
                        Lanzar a la Nube
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="nubeCanvas"></div>
            </div>
        </div>
    </div>

    <div id="modalIdea" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-4 z-[200] backdrop-blur-md overflow-y-auto">
        <div class="bg-slate-900 border border-amber-500/30 p-6 md:p-10 rounded-3xl max-w-4xl w-full shadow-2xl my-10">
            <h3 id="modalTitulo" class="text-3xl font-bold text-amber-400 mb-6"></h3>
            
            <div id="diagramContainer" class="bg-white/5 p-4 rounded-2xl mb-6 hidden">
                <div class="mermaid" id="mermaidDiv"></div>
            </div>

            <p id="modalContenido" class="text-slate-300 leading-relaxed mb-8 whitespace-pre-line text-lg"></p>
            
            <div class="flex justify-between items-center border-t border-slate-800 pt-6">
                <button onclick="cerrarModal()" class="text-slate-500 hover:text-white transition uppercase text-xs font-bold tracking-widest">Cerrar</button>
                <div class="flex gap-6">
                    <button id="btnEliminar" class="text-red-500 hover:text-red-400 text-sm italic">Eliminar permanentemente</button>
                    <button id="btnEditar" class="bg-amber-600 hover:bg-amber-500 px-6 py-2 rounded-xl text-sm font-black transition">EDITAR</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let notas = JSON.parse(localStorage.getItem('sap_wiki_storage')) || [];

        function guardarNota() {
            const titulo = document.getElementById('titulo').value.trim();
            const contenido = document.getElementById('contenido').value.trim();
            if(!titulo || !contenido) return;

            notas.push({ id: Date.now(), titulo, contenido });
            localStorage.setItem('sap_wiki_storage', JSON.stringify(notas));
            limpiarCampos();
            renderNube();
        }

async function verDetalle(id) {
    const nota = notas.find(n => n.id === id);
    const modal = document.getElementById('modalIdea');
    const diagCont = document.getElementById('diagramContainer');
    const mermaidDiv = document.getElementById('mermaidDiv');
    const modalContenido = document.getElementById('modalContenido');

    document.getElementById('modalTitulo').innerText = nota.titulo;

    // Regex para encontrar el bloque de Mermaid (desde flowchart/graph hasta el final)
    const mermaidRegex = /(flowchart|graph|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|pie)[\s\S]*/i;
    const match = nota.contenido.match(mermaidRegex);

    if (match) {
        diagCont.classList.remove('hidden');
        // El diagrama es lo que encontró la Regex
        const codigoMermaid = match[0];
        // El texto es todo lo que está ANTES del diagrama
        const textoLimpio = nota.contenido.replace(codigoMermaid, '').trim();
        
        modalContenido.innerText = textoLimpio;
        mermaidDiv.innerHTML = codigoMermaid;
        mermaidDiv.removeAttribute('data-processed');
        
        try {
            await mermaid.run({ nodes: [mermaidDiv] });
        } catch (e) {
            console.error("Error Mermaid:", e);
            mermaidDiv.innerHTML = "<span class='text-red-500 font-mono text-xs'>Sintaxis de diagrama incorrecta</span>";
        }
    } else {
        diagCont.classList.add('hidden');
        modalContenido.innerText = nota.contenido;
    }

    modal.style.display = 'flex';
    
    // Configurar botones de eliminar y editar (se mantienen igual)
    document.getElementById('btnEliminar').onclick = () => {
        if(confirm('¿Borrar?')) { notas = notas.filter(n => n.id !== id); localStorage.setItem('sap_wiki_storage', JSON.stringify(notas)); cerrarModal(); renderNube(); }
    };
    document.getElementById('btnEditar').onclick = () => {
        document.getElementById('titulo').value = nota.titulo;
        document.getElementById('contenido').value = nota.contenido;
        notas = notas.filter(n => n.id !== id);
        cerrarModal();
        renderNube();
    };
}

        function renderNube(filtro = "") {
            const canvas = document.getElementById('nubeCanvas');
            canvas.innerHTML = '';
            const filtered = notas.filter(n => n.titulo.toLowerCase().includes(filtro.toLowerCase()) || n.contenido.toLowerCase().includes(filtro.toLowerCase()));

            filtered.forEach((nota, i) => {
                const el = document.createElement('div');
                el.className = 'idea-flotante';
                el.innerText = nota.titulo;
                el.style.top = `${Math.random() * 80 + 5}%`;
                el.style.left = `${Math.random() * 80 + 5}%`;
                el.style.opacity = Math.random() * 0.5 + 0.5;
                const sizes = ['text-sm', 'text-base', 'text-lg', 'text-xl', 'text-2xl'];
                el.classList.add(sizes[Math.floor(Math.random() * sizes.length)]);
                el.style.color = i % 2 === 0 ? '#f8fafc' : '#fbbf24';
                el.onclick = () => verDetalle(nota.id);
                canvas.appendChild(el);
            });
        }

        function cerrarModal() { document.getElementById('modalIdea').style.display = 'none'; }
        function filtrarNotas() { renderNube(document.getElementById('buscador').value); }
        function limpiarCampos() { document.getElementById('titulo').value = ''; document.getElementById('contenido').value = ''; }
        function exportarDatos() { 
            const a = document.createElement('a'); 
            a.href = URL.createObjectURL(new Blob([JSON.stringify(notas, null, 2)], {type: 'application/json'})); 
            a.download = 'SAP_Cloud_Backup.json'; a.click(); 
        }

        renderNube();
    </script>
</body>
</html>
