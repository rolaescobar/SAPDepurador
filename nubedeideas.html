<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nube de Ideas Pro - SAP Toolkit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose'
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        #nubeCanvas {
            position: relative; min-height: 75vh; width: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            border-radius: 2.5rem; overflow: hidden; border: 1px dashed #334155;
        }

        .idea-flotante {
            position: absolute; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap; user-select: none; padding: 8px 15px; border-radius: 12px;
        }

        .idea-flotante:hover { 
            transform: scale(1.15) translateY(-5px); 
            background: rgba(245, 158, 11, 0.15); 
            color: #fbbf24 !important; 
            z-index: 100;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .input-field { background-color: #0f172a; border: 1px solid #334155; color: white; transition: all 0.3s; }
        .input-field:focus { border-color: #f59e0b; outline: none; box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2); }

        /* Estilo de Cristal para el Modal */
        #modalContainer {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        /* Contenedor del diagrama con Scroll Interno */
        #diagramContainer {
            max-height: 450px; 
            overflow-y: auto;
            overflow-x: hidden;
            cursor: zoom-in;
            position: relative;
            border: 1px solid rgba(245, 158, 11, 0.2);
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1.5rem;
            margin-bottom: 2rem;
            padding: 25px;
            display: block;
        }

        /* Scrollbar Minimalista */
        #diagramContainer::-webkit-scrollbar { width: 5px; }
        #diagramContainer::-webkit-scrollbar-track { background: transparent; }
        #diagramContainer::-webkit-scrollbar-thumb { 
            background: rgba(245, 158, 11, 0.4); 
            border-radius: 10px; 
        }

        #mermaidDiv svg { max-width: 100%; height: auto; margin: 0 auto; display: block; }

        /* Zoom Overlay */
        #diagramZoomOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.98);
            z-index: 300;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        #diagramZoomOverlay svg { max-width: 95vw; max-height: 90vh; height: auto; }

        .btn-cerrar-x {
            position: absolute; top: 1.5rem; right: 1.5rem; color: #64748b;
            transition: all 0.3s; font-size: 1.25rem;
        }
        .btn-cerrar-x:hover { color: #f59e0b; transform: rotate(90deg); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-black text-white uppercase tracking-tighter flex items-center">
                    <span class="bg-amber-500 text-slate-900 px-2 py-1 rounded-lg mr-3 text-xl"><i class="fas fa-cloud"></i></span>
                    SAP Architecture Cloud
                </h1>
            </div>
            <div class="flex gap-3 items-center">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                    <input type="text" id="buscador" onkeyup="filtrarNotas()" placeholder="Filtrar conocimiento..." class="input-field pl-10 pr-4 py-2 rounded-xl text-sm w-64">
                </div>
                <button onclick="exportarDatos()" class="p-2 text-slate-500 hover:text-amber-500 transition" title="Exportar Backup">
                    <i class="fas fa-file-export"></i>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-slate-800 shadow-xl backdrop-blur-md">
                    <h2 class="text-white font-bold mb-5 text-sm uppercase tracking-widest flex items-center">
                        <i class="fas fa-plus-circle text-amber-500 mr-2"></i> Nueva Entrada
                    </h2>
                    <input type="text" id="titulo" placeholder="Título clave..." class="w-full input-field p-4 rounded-2xl text-sm mb-4">
                    <textarea id="contenido" rows="12" placeholder="Describe el proceso. Tip: Puedes pegar diagramas Mermaid (flowchart TD...)." class="w-full input-field p-4 rounded-2xl text-sm mb-4 font-mono leading-relaxed"></textarea>
                    <button onclick="guardarNota()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-2xl transition shadow-lg shadow-amber-900/20 active:scale-95">
                        Lanzar a la Nube
                    </button>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div id="nubeCanvas"></div>
            </div>
        </div>
    </div>

    <div id="modalIdea" class="fixed inset-0 bg-slate-950/60 hidden items-center justify-center p-4 z-[200] backdrop-blur-sm transition-all duration-300">
        <div id="modalContainer" class="relative p-8 md:p-12 rounded-[2.5rem] w-full max-w-3xl shadow-2xl overflow-hidden animate-in fade-in zoom-in duration-300">
            
            <button onclick="cerrarModal()" class="btn-cerrar-x">
                <i class="fas fa-times"></i>
            </button>

            <h3 id="modalTitulo" class="text-3xl font-black text-white mb-2 tracking-tight pr-10"></h3>
            <div class="h-1.5 w-16 bg-amber-500 rounded-full mb-8"></div>
            
            <div id="diagramContainer" class="hidden group relative">
                <div class="mermaid" id="mermaidDiv"></div>
                <div class="absolute bottom-3 right-3 bg-slate-900/80 text-[10px] font-bold px-2 py-1 rounded text-amber-500 opacity-0 group-hover:opacity-100 transition pointer-events-none">
                    <i class="fas fa-expand mr-1"></i> CLICK PARA AMPLIAR
                </div>
            </div>

            <p id="modalContenido" class="text-slate-300 leading-relaxed mb-10 whitespace-pre-line text-lg font-medium max-h-[250px] overflow-y-auto pr-2"></p>
            
            <div class="flex justify-between items-center border-t border-white/5 pt-8">
                <button id="btnEliminar" class="text-slate-500 hover:text-red-500 text-[10px] font-black uppercase tracking-[0.2em] transition">
                    <i class="fas fa-trash-alt mr-2"></i> Eliminar entrada
                </button>
                <div class="flex gap-4">
                    <button id="btnEditar" class="bg-amber-600/10 hover:bg-amber-600 border border-amber-600/30 text-amber-500 hover:text-white px-8 py-3 rounded-2xl text-sm font-bold transition">
                        <i class="fas fa-pen-nib mr-2"></i> EDITAR
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="diagramZoomOverlay" onclick="this.style.display='none'">
        <div id="zoomContent"></div>
        <div class="absolute bottom-8 text-white/30 text-[10px] font-black tracking-[0.3em] uppercase pointer-events-none">
            Clic en cualquier parte o ESC para volver
        </div>
    </div>

    <script>
        let notas = JSON.parse(localStorage.getItem('sap_wiki_storage')) || [];

        function guardarNota() {
            const titulo = document.getElementById('titulo').value.trim();
            const contenido = document.getElementById('contenido').value.trim();
            if(!titulo || !contenido) return;

            notas.push({ id: Date.now(), titulo, contenido });
            localStorage.setItem('sap_wiki_storage', JSON.stringify(notas));
            document.getElementById('titulo').value = '';
            document.getElementById('contenido').value = '';
            renderNube();
        }

        async function verDetalle(id) {
            const nota = notas.find(n => n.id === id);
            const modal = document.getElementById('modalIdea');
            const diagCont = document.getElementById('diagramContainer');
            const mermaidDiv = document.getElementById('mermaidDiv');
            const modalContenido = document.getElementById('modalContenido');

            document.getElementById('modalTitulo').innerText = nota.titulo;

            const mermaidRegex = /(flowchart|graph|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|pie)[\s\S]*/i;
            const match = nota.contenido.match(mermaidRegex);

            if (match) {
                diagCont.classList.remove('hidden');
                const codigoMermaid = match[0].trim();
                const textoLimpio = nota.contenido.replace(codigoMermaid, '').trim();
                
                modalContenido.innerText = textoLimpio;
                mermaidDiv.innerHTML = codigoMermaid;
                mermaidDiv.removeAttribute('data-processed');
                
                modal.style.display = 'flex';

                setTimeout(async () => {
                    try {
                        await mermaid.run({ nodes: [mermaidDiv] });
                        diagCont.onclick = () => {
                            const zoomOverlay = document.getElementById('diagramZoomOverlay');
                            document.getElementById('zoomContent').innerHTML = mermaidDiv.innerHTML;
                            zoomOverlay.style.display = 'flex';
                        };
                    } catch (e) {
                        mermaidDiv.innerHTML = "<div class='text-red-500 p-4 text-xs font-mono'>Error en diagrama</div>";
                    }
                }, 150);
            } else {
                diagCont.classList.add('hidden');
                modalContenido.innerText = nota.contenido;
                modal.style.display = 'flex';
            }

            document.getElementById('btnEliminar').onclick = () => {
                if(confirm('¿Eliminar definitivamente?')) { 
                    notas = notas.filter(n => n.id !== id); 
                    localStorage.setItem('sap_wiki_storage', JSON.stringify(notas)); 
                    cerrarModal(); renderNube(); 
                }
            };
            
            document.getElementById('btnEditar').onclick = () => {
                document.getElementById('titulo').value = nota.titulo;
                document.getElementById('contenido').value = nota.contenido;
                notas = notas.filter(n => n.id !== id);
                cerrarModal(); renderNube();
            };
        }

        function renderNube(filtro = "") {
            const canvas = document.getElementById('nubeCanvas');
            canvas.innerHTML = '';
            const filtered = notas.filter(n => 
                n.titulo.toLowerCase().includes(filtro.toLowerCase()) || 
                n.contenido.toLowerCase().includes(filtro.toLowerCase())
            );

            filtered.forEach((nota, i) => {
                const el = document.createElement('div');
                el.className = 'idea-flotante';
                el.innerText = nota.titulo;
                el.style.top = `${Math.random() * 75 + 10}%`;
                el.style.left = `${Math.random() * 75 + 10}%`;
                const sizes = ['text-xs', 'text-sm', 'text-base', 'text-lg', 'text-xl'];
                el.classList.add(sizes[Math.floor(Math.random() * sizes.length)]);
                el.style.color = i % 2 === 0 ? '#f8fafc' : '#fbbf24';
                el.onclick = () => verDetalle(nota.id);
                canvas.appendChild(el);
            });
        }

        function cerrarModal() { 
            document.getElementById('modalIdea').style.display = 'none'; 
            document.getElementById('diagramZoomOverlay').style.display = 'none';
        }

        function filtrarNotas() { renderNube(document.getElementById('buscador').value); }
        
        function exportarDatos() { 
            const blob = new Blob([JSON.stringify(notas, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `SAP_IdeaCloud_Backup.json`;
            a.click();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") cerrarModal();
        });

        renderNube();
    </script>
</body>
</html>
