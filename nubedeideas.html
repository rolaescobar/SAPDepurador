<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP Architecture Cloud - Nube de Ideas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose'
        });
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        body { background-color: #0b1120; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #nubeCanvas {
            position: relative; height: 75vh; width: 100%;
            background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            border-radius: 2.5rem; overflow: hidden; border: 1px dashed #334155;
        }

        .idea-flotante {
            position: absolute; cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap; user-select: none; padding: 8px 15px; border-radius: 12px;
        }

        .idea-flotante:hover { 
            transform: scale(1.15) translateY(-5px); 
            background: rgba(245, 158, 11, 0.15); 
            color: #fbbf24 !important; z-index: 100;
        }
        
        .input-field { background-color: #0f172a; border: 1px solid #334155; color: white; transition: all 0.3s; }
        .input-field:focus { border-color: #f59e0b; outline: none; }

        /* MODAL CONFIGURATION */
        #modalContainer {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(245, 158, 11, 0.3);
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* DIAGRAM CONTAINER WITH DUAL SCROLL */
        #diagramContainer {
            max-height: 450px;
            overflow: auto !important; /* Forzamos scroll en ambos ejes */
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 1.5rem;
            cursor: zoom-in;
            padding: 25px;
            direction: rtl; /* Barra vertical a la izquierda */
        }

        /* Contenedor interno para evitar compresión del SVG */
        #mermaidDiv {
            direction: ltr; 
            display: block; 
            min-width: fit-content; /* Obliga al contenedor a estirarse horizontalmente */
            margin: 0 auto;
        }

        #mermaidDiv svg {
            max-width: none !important; /* Permite que el SVG mantenga su ancho original */
            height: auto;
        }

        .modal-scroll-area {
            overflow-y: auto;
            padding-right: 10px;
        }

        /* CUSTOM SCROLLBARS */
        #diagramContainer::-webkit-scrollbar { width: 10px; height: 10px; }
        #diagramContainer::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); border-radius: 10px; }
        #diagramContainer::-webkit-scrollbar-thumb { background: rgba(245, 158, 11, 0.4); border-radius: 10px; border: 2px solid rgba(0,0,0,0); background-clip: padding-box; }
        #diagramContainer::-webkit-scrollbar-thumb:hover { background: rgba(245, 158, 11, 0.7); background-clip: padding-box; }

        #diagramZoomOverlay {
            display: none; position: fixed; inset: 0; background: rgba(2, 6, 23, 0.98);
            z-index: 300; justify-content: center; align-items: center; padding: 20px;
        }
        #diagramZoomOverlay svg { max-width: 95vw; max-height: 90vh; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-2xl font-black text-white uppercase tracking-tighter flex items-center">
                <span class="bg-amber-500 text-slate-900 px-2 py-1 rounded-lg mr-3 text-lg"><i class="fas fa-project-diagram"></i></span>
                SAP Architecture Cloud
            </h1>
            <div class="flex gap-4 items-center">
                <input type="text" id="buscador" onkeyup="filtrarNotas()" placeholder="Buscar procesos..." class="input-field px-4 py-2 rounded-xl text-sm w-48">
                <div class="flex border-l border-slate-700 pl-4 gap-2">
                    <button onclick="document.getElementById('importInput').click()" class="p-2 text-slate-400 hover:text-green-500" title="Cargar Backup">
                        <i class="fas fa-upload"></i>
                    </button>
                    <button onclick="exportarDatos()" class="p-2 text-slate-400 hover:text-amber-500" title="Descargar Backup">
                        <i class="fas fa-download"></i>
                    </button>
                    <input type="file" id="importInput" class="hidden" accept=".json" onchange="importarDatos(event)">
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1">
                <div class="bg-slate-900/40 p-6 rounded-[2rem] border border-slate-800 backdrop-blur-md shadow-xl">
                    <h2 class="text-white font-bold mb-4 text-xs uppercase tracking-widest">Nueva Entrada</h2>
                    <input type="text" id="titulo" placeholder="Título clave..." class="w-full input-field p-3 rounded-xl text-sm mb-3">
                    <textarea id="contenido" rows="10" placeholder="Escribe tu nota o código Mermaid..." class="w-full input-field p-3 rounded-xl text-sm mb-3 font-mono"></textarea>
                    <button onclick="guardarNota()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-amber-900/20 active:scale-95">
                        Lanzar a la Nube
                    </button>
                </div>
            </div>
            <div class="lg:col-span-3">
                <div id="nubeCanvas"></div>
            </div>
        </div>
    </div>

    <div id="modalIdea" class="fixed inset-0 bg-slate-950/70 hidden items-center justify-center p-4 z-[200] backdrop-blur-sm">
        <div id="modalContainer" class="relative p-6 md:p-10 rounded-[2.5rem] w-full max-w-4xl shadow-2xl animate-in fade-in zoom-in duration-200">
            
            <button onclick="cerrarModal()" class="absolute top-6 right-6 text-slate-500 hover:text-amber-500 text-2xl transition">
                <i class="fas fa-times"></i>
            </button>

            <h3 id="modalTitulo" class="text-2xl font-black text-white mb-6 pr-10 border-b border-white/10 pb-4"></h3>
            
            <div class="modal-scroll-area flex-1 pr-4">
                <div id="diagramContainer" class="hidden">
                    <div class="mermaid" id="mermaidDiv"></div>
                </div>
                <p id="modalContenido" class="text-slate-300 leading-relaxed text-lg whitespace-pre-line"></p>
            </div>
            
            <div class="flex justify-between items-center border-t border-white/5 pt-6 mt-6">
                <button id="btnEliminar" class="text-slate-500 hover:text-red-500 text-[10px] font-black uppercase tracking-widest transition">
                    <i class="fas fa-trash-alt mr-2"></i> Borrar
                </button>
                <button id="btnEditar" class="bg-amber-600 hover:bg-amber-500 text-white px-10 py-3 rounded-2xl text-sm font-bold transition shadow-lg shadow-amber-900/20">
                    EDITAR
                </button>
            </div>
        </div>
    </div>

    <div id="diagramZoomOverlay" onclick="this.style.display='none'">
        <div id="zoomContent"></div>
    </div>

    <script>
        let notas = JSON.parse(localStorage.getItem('sap_wiki_storage')) || [];

        function guardarNota() {
            const titulo = document.getElementById('titulo').value.trim();
            const contenido = document.getElementById('contenido').value.trim();
            if(!titulo || !contenido) return;
            notas.push({ id: Date.now(), titulo, contenido });
            localStorage.setItem('sap_wiki_storage', JSON.stringify(notas));
            document.getElementById('titulo').value = '';
            document.getElementById('contenido').value = '';
            renderNube();
        }

        async function verDetalle(id) {
            const nota = notas.find(n => n.id === id);
            const modal = document.getElementById('modalIdea');
            const diagCont = document.getElementById('diagramContainer');
            const mermaidDiv = document.getElementById('mermaidDiv');
            const modalContenido = document.getElementById('modalContenido');

            document.getElementById('modalTitulo').innerText = nota.titulo;

            const mermaidRegex = /(flowchart|graph|sequenceDiagram|classDiagram|stateDiagram|erDiagram|gantt|pie)[\s\S]*/i;
            const match = nota.contenido.match(mermaidRegex);

            if (match) {
                diagCont.classList.remove('hidden');
                const codigoMermaid = match[0].trim();
                const textoLimpio = nota.contenido.replace(codigoMermaid, '').trim();
                modalContenido.innerText = textoLimpio;
                mermaidDiv.innerHTML = codigoMermaid;
                mermaidDiv.removeAttribute('data-processed');
                modal.style.display = 'flex';
                setTimeout(async () => {
                    try {
                        await mermaid.run({ nodes: [mermaidDiv] });
                        diagCont.onclick = (e) => {
                            // Solo activar zoom si el click es en el diagrama, no en el scroll
                            if (e.target.closest('svg')) {
                                document.getElementById('zoomContent').innerHTML = mermaidDiv.innerHTML;
                                document.getElementById('diagramZoomOverlay').style.display = 'flex';
                            }
                        };
                    } catch (e) { mermaidDiv.innerHTML = "Error de sintaxis en diagrama"; }
                }, 100);
            } else {
                diagCont.classList.add('hidden');
                modalContenido.innerText = nota.contenido;
                modal.style.display = 'flex';
            }

            document.getElementById('btnEliminar').onclick = () => {
                if(confirm('¿Eliminar permanentemente?')) { 
                    notas = notas.filter(n => n.id !== id); 
                    localStorage.setItem('sap_wiki_storage', JSON.stringify(notas)); 
                    cerrarModal(); renderNube(); 
                }
            };
            document.getElementById('btnEditar').onclick = () => {
                document.getElementById('titulo').value = nota.titulo;
                document.getElementById('contenido').value = nota.contenido;
                notas = notas.filter(n => n.id !== id);
                cerrarModal(); renderNube();
            };
        }

        function renderNube(filtro = "") {
            const canvas = document.getElementById('nubeCanvas');
            canvas.innerHTML = '';
            const filtered = notas.filter(n => 
                n.titulo.toLowerCase().includes(filtro.toLowerCase()) || 
                n.contenido.toLowerCase().includes(filtro.toLowerCase())
            );
            filtered.forEach((nota, i) => {
                const el = document.createElement('div');
                el.className = 'idea-flotante';
                el.innerText = nota.titulo;
                el.style.top = `${Math.random() * 70 + 10}%`;
                el.style.left = `${Math.random() * 70 + 10}%`;
                el.style.color = i % 2 === 0 ? '#f8fafc' : '#fbbf24';
                el.onclick = () => verDetalle(nota.id);
                canvas.appendChild(el);
            });
        }

        function cerrarModal() { document.getElementById('modalIdea').style.display = 'none'; }
        function filtrarNotas() { renderNube(document.getElementById('buscador').value); }
        
        function exportarDatos() { 
            const blob = new Blob([JSON.stringify(notas, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `SAP_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importarDatos(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        notas = imported;
                        localStorage.setItem('sap_wiki_storage', JSON.stringify(notas));
                        renderNube();
                        alert("Backup cargado con éxito");
                    }
                } catch(e) { alert("Archivo JSON no válido"); }
            };
            reader.readAsText(event.target.files[0]);
        }

        document.addEventListener('keydown', (e) => { if (e.key === "Escape") cerrarModal(); });
        renderNube();
    </script>
</body>
</html>
